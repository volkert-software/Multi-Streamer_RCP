syntax = "proto3";

package VaseInfraStructure;

enum VideoBitrateControlAlgorithm {
    VBR = 0;
    CBR = 1;
}

message MsgMediaEncoderVideoSettings {
	enum VideoScanMethods
	{
	    UNKNOWN = 0;
	    INTERLACED = 1;
	    PROGRESSIVE = 2;
	}

	int32 StreamId = 1;
    int32 VideoCodec = 2;
    int32 Width = 3;
    int32 Height = 4;
    float Fps = 5;
    int32 TicksPerFrame = 6;
    int32 PixelFormat = 8;
    int32 VideoAccelerator = 9;
    int32 VideoBitrateMin = 10;
    int32 VideoBitrate = 11;
    int32 VideoBitrateMax = 12;
    int32 VideoBitrateCtrlBufferSize = 13;
    int32 VideoBitrateCtrlAlgorithm = 14; // VBR = 0, CBR = 1
    int32 MaxBFrames = 16;
    int32 VideoStreamQualityProfile = 17;
    int32 VideoCodecFeatureProfile = 18;
	int32 VideoGopSize = 19;
    VideoScanMethods VideoScanMethod = 20;
    int32 VideoColorRange = 21;
    int32 VideoColorPrimaries = 22;
    int32 VideoColorTransferCharacteristics = 23;
    int32 VideoColorSpace = 24;
    int32 ChromaSubSampling = 25;
	bool EncodedInputFramesCopying = 30;
}

message MsgMediaEncoderAudioSettings {
	int32 StreamId = 1;
    int32 AudioCodec = 2;
    int32 AudioBitrate = 3;
    int32 SampleRate = 4;
    int32 Channels = 5;
    int32 SampleFormat = 6;
	bool EncodedInputFramesCopying = 20;
}

message MsgMediaEncoderSettings {
    repeated MsgMediaEncoderVideoSettings VideoSettings = 1;
    repeated MsgMediaEncoderAudioSettings AudioSettings = 2;
}