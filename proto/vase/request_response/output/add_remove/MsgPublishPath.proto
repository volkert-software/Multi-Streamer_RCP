syntax = "proto3";

package VaseInfraStructure;

import "MsgMediaMuxerSettings.proto";
import "MsgMediaEncoderSettings.proto";

message MsgPublishPath {
    string ServerId = 1;
    string Path = 2;
    string RouterId = 3;
    MsgMediaMuxerSettings MediaMuxerSettings = 4;
    MsgMediaEncoderSettings MediaEncoderSettings = 5;
}