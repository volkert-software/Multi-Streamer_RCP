syntax = "proto3";

package VaseInfraStructure;

import "MsgMediaDecoderSettings.proto";

message MsgAddNetworkInput {
	string RouterId = 1;
    string Url = 2;
    map<string, string> ProtocolParameters = 3;
    int32 DemuxFormat = 4;
    MsgMediaDecoderSettings MediaDecoderSettings = 5;

    map<string, string> AppStateValues = 10;
}
