syntax = "proto3";

package VaseInfraStructure;

import "MsgVideoDeviceSetting.proto";
import "MsgInputDeviceAudioStreamChannelMappings.proto";

message MsgAddDeckLinkDeviceCapturingInput {
    string RouterId = 1;
    string DeviceId = 2;
    int32 VideoConnection = 3;
    MsgVideoDeviceSetting VideoDeviceSetting = 4;
    int32 ColorDepth = 5;
    map<int32, MsgInputDeviceAudioStreamChannelMappings> InputStreamAudioChannelsMappings = 6;

    map<string, string> AppStateValues = 10;
}