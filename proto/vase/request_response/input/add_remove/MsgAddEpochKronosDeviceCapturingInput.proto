syntax = "proto3";

package VaseInfraStructure;

import "MsgInputDeviceAudioStreamChannelMappings.proto";

message MsgAddEpochKronosDeviceCapturingInput {
    string RouterId = 1;
    string DeviceId = 2;
    int32 InputChannel = 3;
    int32 ColorDepth = 4;
